included:
  - Packages/IngressoKit/Sources
  - Packages/IngressoKit/Tests
  - Projects/Ingresso/Ingresso

excluded:
  - .build
  - DerivedData

disabled_rules:
  - trailing_comma
  - opening_brace

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_string
  - force_unwrapping
  - implicitly_unwrapped_optional
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - vertical_whitespace_closing_braces

line_length:
  warning: 150
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 50
  error: 80

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y

nesting:
  type_level: 2
  function_level: 3

reporter: xcode
